# ─────────────────────────────────────────
# CONTEXT — hangi dosyalar otomatik okunur
# ─────────────────────────────────────────

context:
  - provider: file
  - provider: code
  - provider: terminal
  - provider: problems

# ─────────────────────────────────────────
# SLASH KOMUTLARI
# ─────────────────────────────────────────

slashCommands:
  - name: yeni-ozellik
    description: "Yeni bir özellik eklemek için plan çıkar"
    prompt: >-
      Yer Radarı projesine yeni bir özellik ekleyeceğim. Önce mimari planı
      çıkar: hangi dosyalar etkilenir, hangi sırayla yazılır, dikkat edilmesi
      gereken edge case'ler neler? Sonra onay bekle, kodu sonra yaz.

  - name: hata-coz
    description: "Mevcut hatayı analiz et ve çöz"
    prompt: >-
      Aşağıdaki hata veya beklenmedik davranışı analiz et. Önce kök nedeni
      bul, sonra minimum değişiklikle düzelt. Değiştirdiğin her satırı
      açıkla.

  - name: refactor
    description: "Seçili kodu temizle ve iyileştir"
    prompt: >-
      Seçili kodu Dart best practice'lerine göre refactor et. Davranışı
      değiştirme, sadece okunabilirliği ve sürdürülebilirliği artır.
